<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JDK Smart Factory</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles/tokens.css"/>
<link rel="stylesheet" href="styles/main.css"/>
<link rel="stylesheet" href="styles/components.css"/>
</head>
<body>

<!-- ── Auth Screens ──────────────────────────────────────────────────────── -->
<div id="auth-screen" class="auth-screen">
  <div class="auth-bg-grid"></div>
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">⚙</div>
      <h1 class="auth-logo-name">JDK Factory</h1>
      <p class="auth-logo-sub">Smart Manufacturing Platform</p>
    </div>

    <!-- Login -->
    <div id="view-login" class="auth-view active">
      <div class="input-group">
        <label>Username</label>
        <input id="login-user" type="text" placeholder="your username" autocomplete="username"/>
      </div>
      <div class="input-group">
        <label>Password</label>
        <input id="login-pw" type="password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <div id="login-error" class="form-error hidden"></div>
      <button id="btn-login" class="btn btn-primary btn-full">Sign in →</button>
      <div class="auth-links">
        <button class="link-btn" onclick="showAuthView('signup')">Create account</button>
        <button class="link-btn" onclick="showAuthView('forgot')">Forgot password?</button>
      </div>
    </div>

    <!-- Signup -->
    <div id="view-signup" class="auth-view">
      <div class="input-group">
        <label>Full Name</label>
        <input id="signup-name" type="text" placeholder="Alex Johnson"/>
      </div>
      <div class="input-group">
        <label>Username</label>
        <input id="signup-user" type="text" placeholder="alexj"/>
      </div>
      <div class="input-group">
        <label>Email</label>
        <input id="signup-email" type="email" placeholder="alex@company.com"/>
      </div>
      <div class="input-group">
        <label>Password</label>
        <input id="signup-pw" type="password" placeholder="min 6 characters"/>
      </div>
      <div id="signup-error" class="form-error hidden"></div>
      <div id="signup-success" class="form-success hidden"></div>
      <button id="btn-signup" class="btn btn-primary btn-full">Create Account →</button>
      <div class="auth-links">
        <button class="link-btn" onclick="showAuthView('login')">← Back to sign in</button>
      </div>
    </div>

    <!-- Forgot Password -->
    <div id="view-forgot" class="auth-view">
      <p class="auth-hint">Enter your username or email to receive a reset link.</p>
      <div class="input-group">
        <label>Username or Email</label>
        <input id="forgot-ident" type="text" placeholder="username or email"/>
      </div>
      <div id="forgot-error" class="form-error hidden"></div>
      <div id="forgot-success" class="form-success hidden"></div>
      <button id="btn-forgot" class="btn btn-primary btn-full">Send Reset Link →</button>
      <div class="auth-links">
        <button class="link-btn" onclick="showAuthView('login')">← Back to sign in</button>
      </div>
    </div>
  </div>
</div>

<!-- ── App Shell ─────────────────────────────────────────────────────────── -->
<div id="app-shell" class="app-shell hidden">
  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <span class="brand-icon">⚙</span>
        <div>
          <div class="brand-name">JDK Factory</div>
          <div class="brand-sub">Smart Platform</div>
        </div>
      </div>
      <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle sidebar">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M2 4h12M2 8h12M2 12h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <div class="user-pill">
      <div class="user-avatar" id="user-avatar">A</div>
      <div class="user-info">
        <div class="user-name" id="user-display">Loading…</div>
        <div class="user-role" id="user-role-badge">—</div>
      </div>
    </div>

    <nav class="sidebar-nav" id="sidebar-nav">
      <button class="nav-item active" data-page="dashboard">
        <span class="nav-icon">📊</span><span class="nav-label">Dashboard</span>
      </button>
      <button class="nav-item" data-page="chat">
        <span class="nav-icon">💬</span><span class="nav-label">AI Chat</span>
        <span class="nav-badge new">AI</span>
      </button>
      <div class="nav-section-label">MASTER DATA</div>
      <button class="nav-item" data-page="customers">
        <span class="nav-icon">👥</span><span class="nav-label">Customers</span>
      </button>
      <button class="nav-item" data-page="products">
        <span class="nav-icon">📦</span><span class="nav-label">Products</span>
      </button>
      <button class="nav-item" data-page="formulas">
        <span class="nav-icon">🧪</span><span class="nav-label">Formulas</span>
      </button>
      <button class="nav-item" data-page="materials">
        <span class="nav-icon">🪨</span><span class="nav-label">Raw Materials</span>
      </button>
      <button class="nav-item" data-page="suppliers">
        <span class="nav-icon">🚚</span><span class="nav-label">Suppliers</span>
      </button>
      <div class="nav-section-label">OPERATIONS</div>
      <button class="nav-item" data-page="inventory">
        <span class="nav-icon">🏪</span><span class="nav-label">Inventory</span>
      </button>
      <button class="nav-item" data-page="feasibility">
        <span class="nav-icon">🔍</span><span class="nav-label">Feasibility</span>
      </button>
      <button class="nav-item" data-page="orders">
        <span class="nav-icon">📋</span><span class="nav-label">Orders</span>
      </button>
      <button class="nav-item" data-page="mrp">
        <span class="nav-icon">⚙️</span><span class="nav-label">Run MRP</span>
      </button>
      <div class="nav-section-label">SYSTEM</div>
      <button class="nav-item" data-page="backup">
        <span class="nav-icon">💾</span><span class="nav-label">Backup</span>
      </button>
      <button class="nav-item" data-page="settings">
        <span class="nav-icon">⚙</span><span class="nav-label">Settings</span>
      </button>
    </nav>

    <button id="btn-signout" class="signout-btn">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 2H2a1 1 0 00-1 1v8a1 1 0 001 1h3M9 10l3-3-3-3M12 7H5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Sign out
    </button>
  </aside>

  <!-- Main Content -->
  <main id="main-content" class="main-content">
    <!-- Pages injected here by JS -->
    <div id="page-container"></div>
  </main>
</div>

<!-- Toast container -->
<div id="toast-container" class="toast-container"></div>

<!-- Modal -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div id="modal-box" class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<script src="components/api.js"></script>
<script src="components/ui.js"></script>
<script src="pages/auth.js"></script>
<script src="pages/dashboard.js"></script>
<script src="pages/chat.js"></script>
<script src="pages/customers.js"></script>
<script src="pages/products.js"></script>
<script src="pages/formulas.js"></script>
<script src="pages/materials.js"></script>
<script src="pages/suppliers.js"></script>
<script src="pages/inventory.js"></script>
<script src="pages/feasibility.js"></script>
<script src="pages/orders.js"></script>
<script src="pages/mrp.js"></script>
<script src="pages/backup.js"></script>
<script src="pages/settings.js"></script>
<script src="components/app.js"></script>
</body>
</html>
